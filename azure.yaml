# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    azd: '>= 1.24.0'
    extensions:
        azure.ai.agents: '>= 0.1.30-preview'
name: portfolio-analysis
services:
    analysis-agent:
        project: ./agents/analysis
        host: azure.ai.agent
        language: docker
        docker:
            path: ./Dockerfile
            context: ../..
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
    backend-api:
        project: ./backend
        host: containerapp
        language: docker
        docker:
            remoteBuild: true
    candidate-agent:
        project: ./agents/candidate
        host: azure.ai.agent
        language: docker
        docker:
            path: ./Dockerfile
            context: ../..
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
    frontend:
        project: ./frontend
        host: containerapp
        language: docker
        docker:
            remoteBuild: true
    portfolio-assistant:
        project: ./agents/portfolio-assistant
        host: azure.ai.agent
        language: docker
        docker:
            path: ./Dockerfile
            context: ../..
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
    recommendation-agent:
        project: ./agents/recommendation
        host: azure.ai.agent
        language: docker
        docker:
            path: ./Dockerfile
            context: ../..
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
infra:
    provider: bicep
    path: ./infra
